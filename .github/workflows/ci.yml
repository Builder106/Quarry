name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref — faster
# feedback, lower CI minutes burn.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: contracts (forge)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # forge-std is installed via `forge install --no-git`, so contracts/lib
      # is gitignored. Re-install in CI so forge test can resolve the import.
      - name: Install forge-std
        run: forge install --no-git foundry-rs/forge-std

      - name: Build (with size report)
        run: forge build --sizes

      # ExecutorFork.t.sol auto-skips when MAINNET_RPC_URL is unset — that's
      # intentional in CI. To run fork tests on a branch, set MAINNET_RPC_URL
      # as a repository secret and add `env: MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}`.
      - name: Test (mocks; fork test skips without RPC)
        run: forge test -vvv

      # `forge snapshot --check` would be nice here but it doesn't gracefully
      # handle the skipped ExecutorForkTest::setUp() entry — complains about
      # no matching snapshot. Defer until we figure out the right --match
      # pattern, or until the fork test is wired with a CI-side RPC secret.

  bot:
    name: bot (bun)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
