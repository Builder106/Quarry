<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Quarry — A bare-metal MEV arbitrage simulator">
  <title>Quarry</title>

  <defs>
    <!-- Sandstone / field-survey parchment (light-mode "Core Sample") -->
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ede1"/>
      <stop offset="100%" stop-color="#e6d6b6"/>
    </linearGradient>
    <linearGradient id="ore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4923a"/>
      <stop offset="100%" stop-color="#a36b1d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#sand)"/>

  <!-- Stratigraphic cross-section: sediment rules thickening with depth -->
  <g stroke="#a36b1d">
    <line x1="0" y1="64"  x2="1200" y2="64"  stroke-width="0.75" opacity="0.14"/>
    <line x1="0" y1="132" x2="1200" y2="132" stroke-width="1"    opacity="0.18"/>
    <line x1="0" y1="208" x2="1200" y2="208" stroke-width="1.25" opacity="0.22"/>
    <line x1="0" y1="288" x2="1200" y2="288" stroke-width="1.5"  opacity="0.26"/>
    <line x1="0" y1="362" x2="1200" y2="362" stroke-width="2"    opacity="0.3"/>
  </g>
  <!-- A single ore seam running through the strata -->
  <rect x="0" y="246" width="1200" height="2" fill="#a36b1d" opacity="0.32"/>

  <!-- Mark: quarry pit — nested hexagons excavated toward an ore core -->
  <g transform="translate(965, 210)">
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#a36b1d" stroke-width="2" opacity="0.55"/>
    <polygon points="0,-70 60.6,-35 60.6,35 0,70 -60.6,35 -60.6,-35"
             fill="none" stroke="#a36b1d" stroke-width="2.5" opacity="0.85"/>
    <polygon points="0,-35 30.3,-17.5 30.3,17.5 0,35 -30.3,17.5 -30.3,-17.5"
             fill="url(#ore)"/>
  </g>

  <!-- Wordmark — industrial signage feel -->
  <text x="72" y="206"
        font-family="'Big Shoulders Display', 'Arial Narrow', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="148" font-weight="800" fill="#14110d" letter-spacing="-0.01em">QUARRY</text>

  <!-- Tagline -->
  <text x="76" y="250"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#4a3d2a" letter-spacing="0.01em">A bare-metal MEV arbitrage simulator.</text>

  <!-- Engineering claims — surveyor-readout monospace chips -->
  <g font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace"
     font-size="13" font-weight="500" letter-spacing="0.04em">
    <text x="76"  y="295" fill="#a36b1d">188 B runtime</text>
    <text x="195" y="295" fill="#b8a888">·</text>
    <text x="210" y="295" fill="#a36b1d">110k gas measured</text>
    <text x="364" y="295" fill="#b8a888">·</text>
    <text x="379" y="295" fill="#a36b1d">Yul-native</text>
    <text x="465" y="295" fill="#b8a888">·</text>
    <text x="480" y="295" fill="#a36b1d">Uniswap V2 + Sushiswap</text>
  </g>

  <!-- Footer separator -->
  <line x1="76" y1="345" x2="1124" y2="345" stroke="#d2bf99" stroke-width="1"/>

  <!-- Real V2 runtime bytecode prefix, as a footer caption -->
  <text x="76" y="375"
        font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace"
        font-size="10" fill="#a89878" letter-spacing="0.08em">runtime: 0x5f54330360b85760143560601c60a83560601c6370a0823160e01b5f52306004526020604060245f845afa1560b85760405191</text>

  <!-- Top-right corner tag -->
  <text x="1124" y="50"
        font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace"
        font-size="11" fill="#a89878" letter-spacing="0.12em" text-anchor="end">QUARRY · V2 · 2026</text>
</svg>
