<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Quarry">
  <title>Quarry</title>
  <defs>
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1a14"/>
      <stop offset="1" stop-color="#14110d"/>
    </linearGradient>
    <linearGradient id="ore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4923a"/>
      <stop offset="1" stop-color="#a36b1d"/>
    </linearGradient>
  </defs>
  <!-- Mine-shaft base -->
  <rect width="64" height="64" rx="13" fill="url(#shaft)"/>
  <!-- Quarry pit: hexagons excavated downward toward an ore core -->
  <g fill="none" stroke-linejoin="round">
    <polygon points="32,7 53.65,19.5 53.65,44.5 32,57 10.35,44.5 10.35,19.5"
             stroke="#a36b1d" stroke-width="2.5" opacity="0.75"/>
    <polygon points="32,15 46.72,23.5 46.72,40.5 32,49 17.28,40.5 17.28,23.5"
             stroke="#d4923a" stroke-width="3"/>
  </g>
  <polygon points="32,23 39.79,27.5 39.79,36.5 32,41 24.21,36.5 24.21,27.5"
           fill="url(#ore)"/>
</svg>
