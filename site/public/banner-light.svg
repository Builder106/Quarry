<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Quarry — A bare-metal MEV arbitrage simulator">
  <title>Quarry</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#ece8df"/>
    </linearGradient>
    <linearGradient id="amberFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c98f12"/>
      <stop offset="100%" stop-color="#9a6c0a"/>
    </linearGradient>
    <radialGradient id="markGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c98f12" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c98f12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Faint horizontal rules -->
  <g stroke="#d4cfc4" stroke-width="0.5" opacity="0.7">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
  </g>

  <!-- Mark -->
  <g transform="translate(965, 210)">
    <circle cx="0" cy="0" r="160" fill="url(#markGlow)"/>
    <polygon points="0,-105 91,-52.5 91,52.5 0,105 -91,52.5 -91,-52.5"
             fill="none" stroke="#c98f12" stroke-width="1.5" opacity="0.85"/>
    <polygon points="0,-70 60.6,-35 60.6,35 0,70 -60.6,35 -60.6,-35"
             fill="none" stroke="#c98f12" stroke-width="1.5" opacity="0.7"/>
    <polygon points="0,-35 30.3,-17.5 30.3,17.5 0,35 -30.3,17.5 -30.3,-17.5"
             fill="url(#amberFill)" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="200"
        font-family="-apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="140" font-weight="700" fill="#1a1f2e" letter-spacing="-0.04em">Quarry</text>

  <!-- Tagline -->
  <text x="76" y="248"
        font-family="-apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#5a6478" letter-spacing="-0.005em">A bare-metal MEV arbitrage simulator.</text>

  <!-- Engineering claims -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
     font-size="13" font-weight="500" letter-spacing="0.04em">
    <text x="76" y="293" fill="#9a6c0a">188 B runtime</text>
    <text x="195" y="293" fill="#bcb6a8">·</text>
    <text x="210" y="293" fill="#9a6c0a">110k gas measured</text>
    <text x="364" y="293" fill="#bcb6a8">·</text>
    <text x="379" y="293" fill="#9a6c0a">Yul-native</text>
    <text x="465" y="293" fill="#bcb6a8">·</text>
    <text x="480" y="293" fill="#9a6c0a">Uniswap V2 + Sushiswap</text>
  </g>

  <!-- Footer separator -->
  <line x1="76" y1="345" x2="1124" y2="345" stroke="#d4cfc4" stroke-width="0.5"/>

  <!-- Real V2 runtime bytecode prefix -->
  <text x="76" y="375"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="10" fill="#a89f8e" letter-spacing="0.08em">runtime: 0x5f54330360b85760143560601c60a83560601c6370a0823160e01b5f52306004526020604060245f845afa1560b85760405191</text>

  <!-- Top-right corner tag -->
  <text x="1124" y="50"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="11" fill="#a89f8e" letter-spacing="0.12em" text-anchor="end">QUARRY · V2 · 2026</text>
</svg>
